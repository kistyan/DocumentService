databaseChangeLog:
  - changeSet:
      id: 2026-06-23-create-table-documents
      author: kistyan
      changes:
        - createTable:
            tableName: documents
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_documents
                    nullable: false
              - column:
                  name: template_name
                  type: varchar
                  constraints:
                    nullable: false
                    foreignKeyName: fk_documents_templates
                    referencedTableName: templates
                    referencedColumnNames: name
              - column:
                  name: path
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: creation_date
                  type: timestamp
                  constraints:
                    nullable: false
