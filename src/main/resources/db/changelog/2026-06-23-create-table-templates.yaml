databaseChangeLog:
  - changeSet:
      id: 2026-06-23-create-table-template
      author: kistyan
      changes:
        - createTable:
            tableName: templates
            columns:
              - column:
                  name: name
                  type: varchar
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_templates
                    nullable: false
              - column:
                  name: path
                  type: varchar
                  constraints:
                    nullable: false
